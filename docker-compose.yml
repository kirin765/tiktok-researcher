services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: viral
      POSTGRES_PASSWORD: viral
      POSTGRES_DB: viral_factory
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped

  api:
    build: .
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      WORKER_SYNC: "false"
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build: .
    restart: unless-stopped
    depends_on:
      - api
      - redis
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      WORKER_SYNC: "false"
    command: ["sh", "-c", "rq worker viral-factory -u redis://redis:6379/0 --worker-ttl ${RQ_WORKER_JOB_TIMEOUT:-600} & rq worker viral-factory -u redis://redis:6379/0 --worker-ttl ${RQ_WORKER_JOB_TIMEOUT:-600} & rq worker viral-factory -u redis://redis:6379/0 --worker-ttl ${RQ_WORKER_JOB_TIMEOUT:-600} & wait"]
    volumes:
      - ./data:/data

  scheduler:
    build: .
    depends_on:
      - api
      - redis
      - postgres
    env_file:
      - .env
    environment:
      WORKER_SYNC: "false"
    command: ["python", "-m", "app.scheduler.scheduler_main"]
    volumes:
      - ./data:/data

volumes:
  pgdata:
